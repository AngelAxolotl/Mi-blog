<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" 
rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

<body class="text-white" style="background-color: #605B51;">
<main>
<div class="container mt-5">
<h2 class="text-center mb-4">Contacto</h2>
<div class="row justify-content-center">
<div class="col-md-6">
<form id="formContacto">

        
  <!--para el nombre -->
  <div class="mb-3">
  <label class="form-label">Ingrese su nombre</label>
 <textarea class="form-control" id="nombre" rows="1" required></textarea>
  </div>
  
  
  
  <!-- Para el correo -->
  <div class="mb-3">
  <label class="form-label">Correo electrónico</label>
  <input type="email" class="form-control" id="email" required>
  </div>

  <!-- El mensaje -->
  <div class="mb-3">
  <label class="form-label">Mensaje</label>
 <textarea class="form-control" id="mensaje" rows="4" required></textarea>
  </div>

  <!-- Boton de enviar -->
    <button type="submit" class="btn btn-outline-primary w-100">
    Enviar
    </button>
    
    <a href="index.html" class="btn btn-outline-warning w-100">
      Regresar al menu 
    </a>

    </form>

    <!-- Para la alerta -->
    <div id="alerta" class="alert alert-success alert-dismissible fade show mt-3 d-none" role="alert">
        El mensaje ha sido enviado
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    </div>
  </div>
</div>
 
  
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" 
integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

<script>
document.getElementById("formContacto").addEventListener("submit", function(event) {
  event.preventDefault(); // evita que recargue la pagina 

  let alerta = document.getElementById("alerta");
  alerta.classList.remove("d-none");

  // limpia los datos
  document.getElementById("nombre").value = "";
  document.getElementById("email").value = "";
  document.getElementById("mensaje").value = "";
});
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</main>

</body>
