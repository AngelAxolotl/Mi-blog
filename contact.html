<body class="text-white" style="background-color: #605B51;">
<main>
<div class="container mt-5">
<h2 class="text-center mb-4">Contacto</h2>
<div class="row justify-content-center">
<div class="col-md-6">
<form id="formContacto">

        
  <!--para el nombre -->
  <div class="mb-3">
  <label class="form-label">Ingrese su nombre</label>
 <textarea class="form-control" id="nombre" rows="1" required></textarea>
  </div>
  
  
  
  <!-- Para el correo -->
  <div class="mb-3">
  <label class="form-label">Correo electrónico</label>
  <input type="email" class="form-control" id="email" required>
  </div>

  <!-- El mensaje -->
  <div class="mb-3">
  <label class="form-label">Mensaje</label>
 <textarea class="form-control" id="mensaje" rows="4" required></textarea>
  </div>

  <!-- Boton de enviar -->
    <button type="submit" class="btn btn-outline-primary w-100">
    Enviar
    </button>
    
    <a href="index.html" class="btn btn-outline-warning w-100">
      Regresar al menu 
    </a>

    </form>
  </section>

  <nav>
     <ul>
    <li><a href="index.html">Inicio</a></li>
  </ul>
  </nav>
 
  
</main>

</body>
